name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write # create tags and releases

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for versioning and changelog

      # Compute the next semantic version from Conventional Commits and create
      # the tag. Produces no tag (and skips the release) when there is nothing
      # release-worthy since the last tag (e.g. only chore:/docs:/ci: commits).
      - name: Determine version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: false

      - name: Set up Go
        if: steps.tag.outputs.new_tag != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Fetch the new tag
        if: steps.tag.outputs.new_tag != ''
        run: git fetch --tags --force

      - name: Release with GoReleaser
        if: steps.tag.outputs.new_tag != ''
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.new_tag }}
          # Optional: a PAT with `contents:write` on RaphaelNeumann/homebrew-tap.
          # When unset, the Homebrew formula step is skipped automatically.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
