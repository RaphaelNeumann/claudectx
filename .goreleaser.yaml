version: 2

project_name: claudectx

# Make HOMEBREW_TAP_GITHUB_TOKEN always defined (empty when not provided), so the
# cask token/skip_upload templates below can reference it safely.
env:
  - HOMEBREW_TAP_GITHUB_TOKEN={{ index .Env "HOMEBREW_TAP_GITHUB_TOKEN" }}

before:
  hooks:
    - go mod tidy

builds:
  - id: claudectx
    main: .
    binary: claudectx
    env:
      - CGO_ENABLED=0
    # macOS-only: the per-profile Keychain slot detection relies on /usr/bin/security.
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/raphaelneumann/claudectx/cmd.version={{ .Version }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: claudectx
    binaries:
      - claudectx
    repository:
      owner: RaphaelNeumann
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    # Skip publishing the cask unless a tap token is configured, so the core
    # release (binaries + checksums) succeeds even before the tap repo exists.
    skip_upload: '{{ eq .Env.HOMEBREW_TAP_GITHUB_TOKEN "" }}'
    homepage: "https://github.com/RaphaelNeumann/claudectx"
    description: "Switch between multiple Claude Code accounts"

release:
  github:
    owner: RaphaelNeumann
    name: claudectx
